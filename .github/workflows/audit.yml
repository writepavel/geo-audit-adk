name: Run Audit

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to audit"
        required: true
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Run GEO audit
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SANDBOX_API_KEY: ${{ secrets.SANDBOX_API_KEY }}
        run: |
          python -m geo_audit_agent.main audit ${{ inputs.url }} --output audit_result.json

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: audit-result
          path: audit_result.json
